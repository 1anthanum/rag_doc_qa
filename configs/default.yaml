# RAG Document Q&A — Default Configuration
# Override via environment variables or CLI arguments.

# ── Ingestion ───────────────────────────────────────────────────
ingestion:
  chunking:
    strategy: recursive        # fixed_size | sentence | recursive | semantic
    chunk_size: 512
    overlap: 64
    min_chunk_size: 50
    semantic_threshold: 0.5    # Similarity threshold for semantic chunking
  embedding:
    provider: local            # local | openai
    model: all-MiniLM-L6-v2   # local: sentence-transformers model
    # model: text-embedding-3-small  # openai model
    batch_size: 32

# ── Retrieval ───────────────────────────────────────────────────
retrieval:
  mode: simple                 # simple | hybrid
  vector_store: faiss          # faiss | chroma
  top_k: 5
  score_threshold: 0.0
  rerank: false
  rerank_model: cross-encoder/ms-marco-MiniLM-L-6-v2

  # Hybrid search settings (BM25 + dense vectors + RRF fusion)
  hybrid_search:
    enabled: false
    dense_weight: 0.7
    sparse_weight: 0.3
    fusion: rrf                # rrf | weighted
    rrf_k: 60

  # Query processing (rewrite / HyDE / decompose)
  query_processing:
    enabled: false
    strategy: none             # none | rewrite | hyde | decompose
    max_rewrites: 2

  # ChromaDB-specific settings
  chroma:
    collection_name: documents
    persist_directory: ./chroma_db

  # FAISS-specific settings
  faiss:
    index_path: ./index

# ── Generation ──────────────────────────────────────────────────
generation:
  provider: openai             # openai | ollama
  model: gpt-4o-mini
  temperature: 0.1
  max_tokens: 1024

  # Ollama-specific settings
  ollama:
    base_url: http://localhost:11434
    model: llama3.1

# ── Agentic RAG ────────────────────────────────────────────────
agentic:
  enabled: false               # Enable corrective RAG pipeline
  corrective_rag: true         # Evaluate & re-retrieve on irrelevant results
  max_correction_rounds: 2     # Max query rewrite + re-retrieve cycles
  relevance_threshold: 0.5     # Minimum relevance score
  adaptive_retrieval: true     # Skip retrieval for conversational follow-ups
  multi_hop: true              # Decompose complex questions into sub-queries
  max_sub_questions: 3         # Max sub-questions for decomposition

# ── API Server ──────────────────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "http://localhost:8501"

# ── Streamlit App ───────────────────────────────────────────────
app:
  page_title: "RAG Document Q&A"
  default_mode: qa
  max_file_size_mb: 50
